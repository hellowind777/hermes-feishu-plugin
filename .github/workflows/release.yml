name: Release And Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      publish_enabled: ${{ steps.npm-token.outputs.publish_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate tag version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          python_version="$(python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")"
          plugin_version="$(python -c "from pathlib import Path; lines = Path('plugin.yaml').read_text(encoding='utf-8').splitlines(); version = next(line.split(':', 1)[1].strip() for line in lines if line.startswith('version:')); print(version)")"

          test "$tag_version" = "$package_version"
          test "$tag_version" = "$python_version"
          test "$tag_version" = "$plugin_version"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Pack npm archive
        run: npm pack

      - name: Check npm token
        id: npm-token
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "publish_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish_enabled=true" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            *.tgz

  publish-npm:
    needs: release
    if: ${{ needs.release.outputs.publish_enabled == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
